{% extends "base.html" %}

{% block title %}Créer une actualité{% endblock %}

{% block content %}
<div class="card shadow-lg">
    <div class="card-header">
        <h2>Créer une nouvelle actualité</h2>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label for="title">Titre</label>
                <input type="text" class="form-control" id="title" name="title" required placeholder="Ex: Découverte d'une nouvelle exoplanète">
            </div>

            <div class="form-group">
                <label for="content">Contenu de l'actualité</label>
                <textarea class="form-control" id="content" name="content" rows="8" required placeholder="Écrivez le contenu de l'actualité..."></textarea>
            </div>

            <div class="form-group">
                <label for="image_path">Chemin de l'image (optionnel)</label>
                <input type="text" class="form-control" id="image_path" name="image_path" placeholder="/static/images/image.jpg">
            </div>

            <div class="form-group form-check">
                <input type="checkbox" class="form-check-input" id="is_published" name="is_published">
                <label class="form-check-label" for="is_published">
                    Publier immédiatement
                </label>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary">Créer l'actualité</button>
                <a href="{{ url_for('news_list') }}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
